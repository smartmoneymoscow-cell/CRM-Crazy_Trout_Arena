<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Превью нижнего меню</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0ebe3; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; padding: 20px; }
  
  .container { width: 375px; }
  
  .phone {
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    position: relative;
    height: 500px;
  }
  
  .content { padding: 20px; background: #fbf6ec; height: 100%; }
  .content h1 { font-size: 22px; font-weight: 700; margin-bottom: 16px; color: #1a1a1a; }
  .card { background: #fff; border: 1px solid #efe8d8; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
  .input { background: #f3eee4; border-radius: 10px; padding: 10px 14px; color: #999; font-size: 14px; }
  .btn { background: #fff; border: 1px solid #ddd3bc; border-radius: 12px; padding: 12px; text-align: center; color: #8a6d1e; font-weight: 600; font-size: 14px; }
  
  /* === НИЖНЕЕ МЕНЮ === */
  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-top: 0.5px solid #e0e0e0;
    /* padding-top: 4px ← было 12px, уменьшено */
    /* padding-bottom: 4px ← было 12px, уменьшено */
    padding: 4px 0 4px 0;
    display: flex;
    justify-content: space-around;
    align-items: center;
  }
  
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px 0;
    flex: 1;
    cursor: pointer;
  }
  
  .nav-item .icon {
    font-size: 24px; /* ← БЕЗ ИЗМЕНЕНИЙ (было 24px) */
    line-height: 1;
  }
  
  .nav-item .label {
    font-size: 12px; /* ← БЕЗ ИЗМЕНЕНИЙ (было 12px) */
    margin-top: 2px;
    color: #757575;
  }
  
  .nav-item.active .icon { color: #e8912b; }
  .nav-item.active .label { color: #e8912b; font-weight: 600; }
  .nav-item:not(.active) .icon { color: #9e9e9e; }
  
  /* === РАЗМЕРЫ === */
  .info {
    width: 375px;
    margin-top: 16px;
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.8;
    color: #333;
  }
  .info b { color: #1a1a1a; }
  .info .old { color: #999; text-decoration: line-through; }
  .info .new { color: #e8912b; font-weight: 600; }
  .info .unchanged { color: #4caf50; }
  
  .row {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #f0f0f0;
    padding: 4px 0;
  }
  .row:last-child { border-bottom: none; }
</style>
</head>
<body>

<div class="container">
  <div class="phone">
    <div class="content">
      <h1>Выставление чека</h1>
      <div class="card">
        <div class="card-title">Клиент</div>
        <div class="input">🔍 Поиск по имени или телефону…</div>
      </div>
      <div class="card">
        <div class="card-title">Тип клиента</div>
        <div style="display:flex;gap:12px;">
          <div class="input" style="flex:1">ТАРИФ</div>
          <div class="input" style="flex:1">ЦЕНА, ₽</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Улов</div>
        <div class="btn">+ Добавить рыбу</div>
      </div>
    </div>
    
    <div class="bottom-nav">
      <div class="nav-item"><span class="icon">📍</span><span class="label">Карта</span></div>
      <div class="nav-item active"><span class="icon">🧾</span><span class="label">Чек</span></div>
      <div class="nav-item"><span class="icon">📋</span><span class="label">Чеки</span></div>
      <div class="nav-item"><span class="icon">📊</span><span class="label">P&L</span></div>
      <div class="nav-item"><span class="icon">👤</span><span class="label">Профиль</span></div>
    </div>
  </div>
  
  <div class="info">
    <div class="row"><b>Иконки</b> <span class="unchanged">24px (без изменений)</span></div>
    <div class="row"><b>Текст</b> <span class="unchanged">12px (без изменений)</span></div>
    <div class="row"><b>Отступ сверху</b> <span class="old">12px</span> → <span class="new">4px</span></div>
    <div class="row"><b>Отступ снизу</b> <span class="old">12px</span> → <span class="new">4px</span></div>
    <div class="row"><b>Высота меню</b> <span class="old">~80px</span> → <span class="new">~60px</span></div>
  </div>
</div>

</body>
</html>
