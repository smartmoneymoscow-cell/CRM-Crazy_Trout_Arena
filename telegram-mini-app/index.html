<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light dark">
  
  <title>🐟 Crazy Trout Arena</title>
  
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- Google Fonts — PT Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- jsQR — декодирование QR из изображений -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  
  <!-- Стили -->
  <link rel="stylesheet" href="src/css/variables.css">
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/screens.css">
</head>
<body>
  <!-- Загрузчик -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="splash-icon">🐟</div>
      <div class="splash-title">Crazy Trout Arena</div>
      <div class="splash-loader">
        <div class="splash-bar"></div>
      </div>
    </div>
  </div>

  <!-- Основной контейнер -->
  <div id="app" class="app hidden">
    <!-- Хедер -->
    <header id="header" class="header">
      <div class="header-title">Crazy Trout Arena</div>
    </header>

    <!-- Контент экранов -->
    <main id="screen-container" class="screen-container">
      <!-- Экраны рендерятся динамически -->
    </main>

    <!-- Нижняя навигация -->
    <nav id="nav-bar" class="nav-bar">
      <!-- Рендерится в nav-bar.js -->
    </nav>
  </div>

  <!-- Приложение -->
  <script type="module" src="src/js/app.js"></script>
</body>
</html>
