<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light dark">
  <title>🐟 Crazy Trout Arena</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Google Fonts — Roboto (как Flutter-приложение) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">

  <!-- Графики: кастомный Canvas (без Chart.js) -->

  <!-- jsQR — декодирование QR из изображений -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <!-- Стили -->
  <link rel="stylesheet" href="src/css/variables.css">
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/screens.css">
</head>
<body>
  <!-- Загрузчик (как Flutter SplashScreen + FloatPreloader) -->
  <div id="splash" class="splash">
    <div class="splash-logo">
      <img src="src/assets/icons/splash_logo.png" alt="Crazy Trout Arena">
    </div>
    <div class="splash-preloader">
      <div class="splash-spinner"></div>
      <div class="splash-label">Загрузка…</div>
    </div>
  </div>

  <!-- Основной контейнер -->
  <div id="app" class="hidden">
    <!-- Контент экранов -->
    <main id="screen-container"></main>

    <!-- Нижняя навигация -->
    <nav id="nav-bar" class="nav-bar"></nav>
  </div>

  <!-- Приложение -->
  <script type="module" src="src/js/app.js"></script>
</body>
</html>
