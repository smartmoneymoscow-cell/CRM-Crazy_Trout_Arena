<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Float Preloader — v3</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 40px;
  padding: 20px;
}
h1 { color: #fff; font-size: 18px; font-weight: 600; }
h2 { color: #8C8576; font-size: 13px; font-weight: 500; margin-bottom: 12px; }
.card {
  background: #fff;
  border-radius: 20px;
  padding: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 320px;
}
canvas { display: block; }
.progress-track {
  width: 200px;
  height: 6px;
  background: #F3EEE4;
  border-radius: 3px;
  margin: 14px auto 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #D4A85A, #E89829);
  border-radius: 3px;
  transition: width 0.15s linear;
}
.label {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: #8C8576;
}
.controls {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.controls button {
  padding: 8px 14px;
  border: 1px solid #E7E0D1;
  border-radius: 8px;
  background: #FAF6EE;
  font-size: 12px;
  cursor: pointer;
  color: #14130F;
  font-weight: 600;
}
.controls button:hover { background: #F3EEE4; }
</style>
</head>
<body>

<h1>🐟 Float Preloader — v3</h1>

<div class="card">
  <h2>Indeterminate (поиск)</h2>
  <canvas id="c1" width="600" height="260"></canvas>
  <div class="progress-track"><div id="fill1" class="progress-fill"></div></div>
  <div class="label" id="label1">Ищем принтеры…</div>
</div>

<div class="card">
  <h2>Determinate (печать)</h2>
  <canvas id="c2" width="600" height="260"></canvas>
  <div class="progress-track"><div id="fill2" class="progress-fill"></div></div>
  <div class="label" id="label2">Подключение…</div>
  <div class="controls">
    <button onclick="setDet(0)">0%</button>
    <button onclick="setDet(0.5)">50%</button>
    <button onclick="setDet(1)">100%</button>
    <button onclick="animateDet()">▶ Анимация</button>
  </div>
</div>

<script>
class FloatRenderer {
  constructor(canvas, opts = {}) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.w = canvas.width;
    this.h = canvas.height;
    this.bobTime = 0;
    this.waveTime = 0;
    this.bobSpeed = opts.bobSpeed || 0.018;
    this.waveSpeed = opts.waveSpeed || 0.006;
    this.running = true;
    this.loop();
  }

  loop() {
    if (!this.running) return;
    this.bobTime += this.bobSpeed;
    this.waveTime += this.waveSpeed;
    this.draw();
    requestAnimationFrame(() => this.loop());
  }

  draw() {
    const ctx = this.ctx;
    const w = this.w;
    const h = this.h;
    const cx = w / 2;
    ctx.clearRect(0, 0, w, h);

    const waterY = h * 0.6;
    const bob = Math.sin(this.bobTime * Math.PI) * 12;
    const waveOff = this.waveTime * 2 * Math.PI;

    // Water fill
    ctx.beginPath();
    ctx.moveTo(0, waterY);
    for (let x = 0; x <= w; x += 2) {
      const y = waterY + Math.sin((x / w) * 3 * Math.PI + waveOff) * 3.5
                    + Math.sin((x / w) * 5.5 * Math.PI - waveOff * 0.6) * 1.5;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
    ctx.fillStyle = 'rgba(42, 106, 126, 0.1)';
    ctx.fill();

    // Water line
    ctx.beginPath();
    for (let x = 0; x <= w; x += 2) {
      const y = waterY + Math.sin((x / w) * 3 * Math.PI + waveOff) * 3.5
                    + Math.sin((x / w) * 5.5 * Math.PI - waveOff * 0.6) * 1.5;
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(42, 106, 126, 0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // === FLOAT ===
    const fx = cx;
    const fy = waterY - 5 + bob;

    // --- Antenna (thin rod) ---
    const antTop = fy - 65;
    const antBot = fy - 22;
    ctx.beginPath();
    ctx.moveTo(fx, antTop);
    ctx.lineTo(fx, antBot);
    ctx.strokeStyle = '#5C4D2F';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Antenna tip (small ball)
    ctx.beginPath();
    ctx.arc(fx, antTop - 3, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#E89829';
    ctx.fill();

    // --- Body: classic pear/egg shape ---
    // Upper body (RED) — wide rounded top
    const bodyCenterY = fy - 6;
    const bodyRx = 16; // horizontal radius
    const bodyRy = 20; // vertical radius (upper half)

    // Red top half
    ctx.beginPath();
    ctx.ellipse(fx, bodyCenterY, bodyRx, bodyRy, 0, Math.PI, 0);
    ctx.fillStyle = '#C9302C';
    ctx.fill();

    // Glossy highlight on red
    ctx.beginPath();
    ctx.ellipse(fx - 5, bodyCenterY - 8, 5, 10, -0.15, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();

    // White/cream bottom half
    ctx.beginPath();
    ctx.ellipse(fx, bodyCenterY, bodyRx, bodyRy * 0.6, 0, 0, Math.PI);
    ctx.fillStyle = '#F5F0E3';
    ctx.fill();

    // Thin dividing line
    ctx.beginPath();
    ctx.moveTo(fx - bodyRx, bodyCenterY);
    ctx.lineTo(fx + bodyRx, bodyCenterY);
    ctx.strokeStyle = '#8C8576';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // --- Lower stem (below body, connects to keel) ---
    const stemBot = bodyCenterY + bodyRy * 0.6;
    const keelTop = stemBot + 6;
    ctx.beginPath();
    ctx.moveTo(fx, stemBot);
    ctx.lineTo(fx, keelTop);
    ctx.strokeStyle = '#5C4D2F';
    ctx.lineWidth = 2;
    ctx.stroke();

    // --- Keel (wire going down) ---
    const keelBot = fy + 30;
    ctx.beginPath();
    ctx.moveTo(fx, keelTop);
    ctx.lineTo(fx, keelBot);
    ctx.strokeStyle = '#8C8576';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Keel weight (small oval)
    ctx.beginPath();
    ctx.ellipse(fx, keelBot, 4, 3, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#6B5B3A';
    ctx.fill();

    // --- Fishing line (dashed into water) ---
    ctx.beginPath();
    ctx.setLineDash([3, 4]);
    ctx.moveTo(fx, keelBot + 3);
    ctx.lineTo(fx, waterY + 35);
    ctx.strokeStyle = 'rgba(100,100,100,0.2)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.setLineDash([]);
  }

  destroy() { this.running = false; }
}

// === Indeterminate ===
const f1 = new FloatRenderer(document.getElementById('c1'), { bobSpeed: 0.022, waveSpeed: 0.005 });
const fill1 = document.getElementById('fill1');
let p1 = 0;
function tick1() {
  p1 += 0.005;
  if (p1 >= 1) p1 = 0;
  fill1.style.width = (p1 * 100) + '%';
  requestAnimationFrame(tick1);
}
tick1();

// === Determinate ===
const f2 = new FloatRenderer(document.getElementById('c2'), { bobSpeed: 0.014, waveSpeed: 0.004 });
const fill2 = document.getElementById('fill2');
const label2 = document.getElementById('label2');

function setDet(v) {
  fill2.style.width = (v * 100) + '%';
  if (v < 0.3) label2.textContent = 'Подключение…';
  else if (v < 0.7) label2.textContent = 'Печать…';
  else if (v < 1) label2.textContent = 'Отправка данных…';
  else label2.textContent = 'Чек отправлен ✓';
}

function animateDet() {
  let p = 0;
  fill2.style.width = '0%';
  label2.textContent = 'Подключение…';
  const iv = setInterval(() => {
    p += 0.012;
    if (p >= 1) { p = 1; clearInterval(iv); }
    setDet(p);
  }, 50);
}
</script>

</body>
</html>
