<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Float Preloader — v6</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 40px;
  padding: 20px;
}
h1 { color: #fff; font-size: 18px; font-weight: 600; }
h2 { color: #8C8576; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
.controls {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.controls button {
  padding: 6px 12px;
  border: 1px solid #E7E0D1;
  border-radius: 6px;
  background: #FAF6EE;
  font-size: 11px;
  cursor: pointer;
  color: #14130F;
  font-weight: 600;
}
.controls button:hover { background: #F3EEE4; }
.controls button.accent {
  background: #E89829;
  color: #fff;
  border-color: #E89829;
}

/* Phone frame */
.phone {
  width: 280px;
  height: 560px;
  background: #1a1a1a;
  border-radius: 36px;
  border: 3px solid #333;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 0 2px #222;
  overflow: hidden;
  position: relative;
}
.phone-notch {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 22px;
  background: #1a1a1a;
  border-radius: 0 0 16px 16px;
  z-index: 10;
}
.phone-screen {
  width: 100%;
  height: 100%;
  background: #FBF6EC;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}
.phone-logo {
  font-family: Georgia, serif;
  font-size: 16px;
  font-weight: bold;
  color: #2C5F3C;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.phone-logo-sub {
  font-family: Georgia, serif;
  font-size: 10px;
  color: #6B8F7B;
  letter-spacing: 2px;
  margin-bottom: 30px;
}
.phone-status {
  position: absolute;
  bottom: 24px;
  left: 0;
  right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.phone-status-text {
  font-size: 10px;
  color: #8C8576;
  font-weight: 600;
}

/* Standalone card */
.card {
  background: #fff;
  border-radius: 20px;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
canvas { display: block; }
</style>
</head>
<body>

<h1>🐟 Float Preloader — v6</h1>

<!-- Phone emulator with splash screen -->
<div style="display:flex; flex-direction:column; align-items:center; gap:16px;">
  <h2>Экран загрузки (эмулятор)</h2>
  <div class="phone">
    <div class="phone-notch"></div>
    <div class="phone-screen">
      <div class="phone-logo">🐟 CRAZY TROUT</div>
      <div class="phone-logo-sub">A R E N A</div>
      <div style="flex:1"></div>
      <canvas id="phone-float" width="100" height="65"></canvas>
      <div class="phone-status">
        <div class="phone-status-text" id="phone-label">Загрузка…</div>
      </div>
    </div>
  </div>
</div>

<!-- Standalone -->
<div class="card">
  <h2>Поклёвка</h2>
  <canvas id="c1" width="300" height="180"></canvas>
  <div class="controls">
    <button class="accent" onclick="f1.triggerBite()">🎣 Поклёвка</button>
    <button onclick="f1.paused = !f1.paused">⏸ Пауза</button>
  </div>
</div>

<script>
class FloatAnimator {
  constructor(canvas, opts = {}) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.w = canvas.width;
    this.h = canvas.height;
    this.bobTime = 0;
    this.bobSpeed = opts.bobSpeed || 0.02;
    this.drawScale = opts.scale || 1;
    this.paused = false;
    this.bitePhase = 0;
    this.biteTime = 0;
    this.biteDipOffset = 0;
    this.biteTilt = 0;
    this.ripples = [];
    this.running = true;
    this.loop();
  }

  loop() {
    if (!this.running) return;
    if (!this.paused) {
      this.bobTime += this.bobSpeed;
      this.updateBite();
      this.updateRipples();
    }
    this.draw();
    requestAnimationFrame(() => this.loop());
  }

  triggerBite() {
    if (this.bitePhase !== 0) return;
    this.bitePhase = 1;
    this.biteTime = 0;
    // Add ripple at start
    this.ripples.push({ r: 5, alpha: 0.4, age: 0 });
  }

  updateRipples() {
    for (let i = this.ripples.length - 1; i >= 0; i--) {
      const rip = this.ripples[i];
      rip.age += 0.02;
      rip.r += 1.2;
      rip.alpha = Math.max(0, 0.4 - rip.age * 0.25);
      if (rip.alpha <= 0) this.ripples.splice(i, 1);
    }
  }

  updateBite() {
    if (this.bitePhase === 0) return;
    this.biteTime += 0.035; // faster
    switch (this.bitePhase) {
      case 1: // Quick sharp dip
        this.biteDipOffset = this.easeOutCubic(Math.min(this.biteTime / 0.2, 1)) * 35;
        this.biteTilt = this.easeOutCubic(Math.min(this.biteTime / 0.2, 1)) * 0.18;
        if (this.biteTime >= 0.2) { this.bitePhase = 2; this.biteTime = 0; this.ripples.push({ r: 8, alpha: 0.5, age: 0 }); }
        break;
      case 2: // Submerge deep
        this.biteDipOffset = 35 + this.easeInOutCubic(Math.min(this.biteTime / 0.35, 1)) * 40;
        this.biteTilt = 0.18 + this.easeInOutCubic(Math.min(this.biteTime / 0.35, 1)) * 0.1;
        if (this.biteTime >= 0.35) { this.bitePhase = 3; this.biteTime = 0; }
        break;
      case 3: // Stay under water (pause submerged)
        this.biteDipOffset = 75;
        this.biteTilt = 0.28;
        if (this.biteTime >= 0.8) { this.bitePhase = 4; this.biteTime = 0; }
        break;
      case 4: // Rise with bounce
        const riseT = this.easeOutBounce(Math.min(this.biteTime / 0.7, 1));
        this.biteDipOffset = 75 * (1 - riseT);
        this.biteTilt = 0.28 * (1 - riseT);
        if (this.biteTime >= 0.7) { this.bitePhase = 5; this.biteTime = 0; this.ripples.push({ r: 5, alpha: 0.3, age: 0 }); }
        break;
      case 5: // Wobble settle
        const wt = Math.min(this.biteTime / 1.0, 1);
        this.biteDipOffset = Math.sin(this.biteTime * 14) * 3 * (1 - wt);
        this.biteTilt = Math.sin(this.biteTime * 12) * 0.02 * (1 - wt);
        if (this.biteTime >= 1.0) { this.bitePhase = 0; this.biteDipOffset = 0; this.biteTilt = 0; }
        break;
    }
  }

  easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
  easeOutBounce(t) {
    if (t < 1/2.75) return 7.5625*t*t;
    if (t < 2/2.75) { t -= 1.5/2.75; return 7.5625*t*t+0.75; }
    if (t < 2.5/2.75) { t -= 2.25/2.75; return 7.5625*t*t+0.9375; }
    t -= 2.625/2.75; return 7.5625*t*t+0.984375;
  }

  draw() {
    const ctx = this.ctx;
    const w = this.w;
    const h = this.h;
    const cx = w / 2;
    ctx.clearRect(0, 0, w, h);

    const waterY = h * 0.6;
    const bob = Math.sin(this.bobTime * Math.PI) * 4;
    const extraDip = this.biteDipOffset;

    // Water
    ctx.fillStyle = 'rgba(42, 106, 126, 0.06)';
    ctx.fillRect(0, waterY, w, h - waterY);
    ctx.beginPath();
    ctx.moveTo(0, waterY);
    ctx.lineTo(w, waterY);
    ctx.strokeStyle = 'rgba(42, 106, 126, 0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Ripples
    for (const rip of this.ripples) {
      ctx.beginPath();
      ctx.ellipse(cx, waterY, rip.r, rip.r * 0.2, 0, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(42, 106, 126, ${rip.alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // === FLOAT ===
    ctx.save();
    ctx.translate(cx, waterY - 2 + bob + extraDip);
    if (this.drawScale !== 1) ctx.scale(this.drawScale, this.drawScale);
    ctx.rotate(this.biteTilt);

    // Keel
    ctx.beginPath();
    ctx.moveTo(0, 22);
    ctx.lineTo(0, 36);
    ctx.strokeStyle = '#6B5B3A';
    ctx.lineWidth = 1.3;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(0, 38, 2.5, 4.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#4A3D28';
    ctx.fill();

    // --- Body: oval/pear ---
    // White bottom
    ctx.beginPath();
    ctx.moveTo(0, -4);
    ctx.bezierCurveTo(8, 0, 12, 12, 9, 20);
    ctx.bezierCurveTo(6, 24, 3, 22, 0, 22);
    ctx.bezierCurveTo(-3, 22, -6, 24, -9, 20);
    ctx.bezierCurveTo(-12, 12, -8, 0, 0, -4);
    ctx.closePath();
    const wg = ctx.createLinearGradient(-11, 8, 11, 8);
    wg.addColorStop(0, '#DDD5C5');
    wg.addColorStop(0.35, '#FAF5EA');
    wg.addColorStop(0.65, '#FAF5EA');
    wg.addColorStop(1, '#D0C8B8');
    ctx.fillStyle = wg;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 0.6;
    ctx.stroke();

    // Red top — more oval
    ctx.beginPath();
    ctx.moveTo(0, -20);
    ctx.bezierCurveTo(6, -18, 9, -12, 8, -4);
    ctx.lineTo(-8, -4);
    ctx.bezierCurveTo(-9, -12, -6, -18, 0, -20);
    ctx.closePath();
    const rg = ctx.createLinearGradient(-9, -12, 9, -12);
    rg.addColorStop(0, '#CC2020');
    rg.addColorStop(0.25, '#FF3838');
    rg.addColorStop(0.55, '#FF4444');
    rg.addColorStop(1, '#CC2020');
    ctx.fillStyle = rg;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 0.6;
    ctx.stroke();

    // Gloss
    ctx.beginPath();
    ctx.ellipse(-2.5, -12, 2, 5.5, -0.1, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();

    // Waterline ring
    ctx.beginPath();
    ctx.ellipse(0, -4, 8.5, 1.2, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(80,60,30,0.2)';
    ctx.lineWidth = 0.7;
    ctx.stroke();

    // --- Antenna ---
    const stickW = 1.6;
    const antTop = -62;
    const antBase = -20;

    // Stick (tapered)
    ctx.beginPath();
    ctx.moveTo(-stickW/2 - 0.2, antBase);
    ctx.lineTo(-stickW/2, antTop + 7);
    ctx.lineTo(stickW/2, antTop + 7);
    ctx.lineTo(stickW/2 + 0.2, antBase);
    ctx.closePath();
    ctx.fillStyle = '#FF3838';
    ctx.fill();

    // White band
    const bandY = antTop + (antBase - antTop) * 0.48;
    ctx.beginPath();
    ctx.rect(-stickW/2 - 0.3, bandY, stickW + 0.6, 3.5);
    ctx.fillStyle = '#F5F0E3';
    ctx.fill();

    // Ball
    ctx.beginPath();
    ctx.arc(0, antTop + 7, 3.5, 0, Math.PI * 2);
    const bg = ctx.createRadialGradient(-0.8, antTop + 5.5, 0.3, 0, antTop + 7, 3.5);
    bg.addColorStop(0, '#FF7070');
    bg.addColorStop(0.4, '#FF3838');
    bg.addColorStop(1, '#CC2020');
    ctx.fillStyle = bg;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-1, antTop + 5.5, 1, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();

    // Fishing line
    ctx.beginPath();
    ctx.setLineDash([2, 3]);
    ctx.moveTo(0, 43);
    ctx.lineTo(0, 56);
    ctx.strokeStyle = 'rgba(100,100,100,0.1)';
    ctx.lineWidth = 0.4;
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
  }

  destroy() { this.running = false; }
}

// Phone float (smaller, slower)
const fp = new FloatAnimator(document.getElementById('phone-float'), { bobSpeed: 0.015, scale: 0.45 });
const phoneLabel = document.getElementById('phone-label');
let ph = 0;
function tickPhone() {
  ph += 0.003;
  if (ph >= 1) ph = 0;
  if (ph < 0.3) phoneLabel.textContent = 'Загрузка…';
  else if (ph < 0.6) phoneLabel.textContent = 'Инициализация…';
  else if (ph < 0.85) phoneLabel.textContent = 'Подключение…';
  else phoneLabel.textContent = 'Почти готово…';
  requestAnimationFrame(tickPhone);
}
tickPhone();
// Auto bite on phone every ~8s
setInterval(() => fp.triggerBite(), 8000);

// Standalone
const f1 = new FloatAnimator(document.getElementById('c1'));
</script>

</body>
</html>
