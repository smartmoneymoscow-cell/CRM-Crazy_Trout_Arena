<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Float Preloader — v5</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 40px;
  padding: 20px;
}
h1 { color: #fff; font-size: 18px; font-weight: 600; }
h2 { color: #8C8576; font-size: 13px; font-weight: 500; margin-bottom: 12px; }
.card {
  background: #fff;
  border-radius: 20px;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 260px;
}
canvas { display: block; }
.progress-track {
  width: 160px;
  height: 4px;
  background: #F3EEE4;
  border-radius: 2px;
  margin: 10px auto 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #D4A85A, #E89829);
  border-radius: 2px;
  transition: width 0.15s linear;
}
.label {
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: #8C8576;
}
.controls {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.controls button {
  padding: 6px 12px;
  border: 1px solid #E7E0D1;
  border-radius: 6px;
  background: #FAF6EE;
  font-size: 11px;
  cursor: pointer;
  color: #14130F;
  font-weight: 600;
}
.controls button:hover { background: #F3EEE4; }
.controls button.accent {
  background: #E89829;
  color: #fff;
  border-color: #E89829;
}
</style>
</head>
<body>

<h1>🐟 Float Preloader — v5</h1>

<div class="card">
  <h2>Покой + Поклёвка</h2>
  <canvas id="c1" width="300" height="200"></canvas>
  <div class="progress-track"><div id="fill1" class="progress-fill"></div></div>
  <div class="label" id="label1">Ищем принтеры…</div>
  <div class="controls">
    <button class="accent" onclick="triggerBite()">🎣 Поклёвка</button>
    <button onclick="togglePause()">⏸ Пауза</button>
  </div>
</div>

<div class="card">
  <h2>Печать (determinate)</h2>
  <canvas id="c2" width="300" height="200"></canvas>
  <div class="progress-track"><div id="fill2" class="progress-fill"></div></div>
  <div class="label" id="label2">Подключение…</div>
  <div class="controls">
    <button onclick="animateDet()">▶ Печать</button>
  </div>
</div>

<script>
// === Float Animation Engine ===
class FloatAnimator {
  constructor(canvas, opts = {}) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.w = canvas.width;
    this.h = canvas.height;
    this.bobTime = 0;
    this.bobSpeed = opts.bobSpeed || 0.02;
    this.paused = false;

    // Bite animation state
    this.bitePhase = 0; // 0=idle, 1=dip, 2=submerge, 3=rise, 4=wobble
    this.biteTime = 0;
    this.biteDipOffset = 0;
    this.biteTilt = 0;

    this.running = true;
    this.loop();
  }

  loop() {
    if (!this.running) return;
    if (!this.paused) {
      this.bobTime += this.bobSpeed;
      this.updateBite();
    }
    this.draw();
    requestAnimationFrame(() => this.loop());
  }

  triggerBite() {
    if (this.bitePhase !== 0) return;
    this.bitePhase = 1;
    this.biteTime = 0;
  }

  updateBite() {
    if (this.bitePhase === 0) return;
    this.biteTime += 0.025;

    switch (this.bitePhase) {
      case 1: // Quick dip down
        this.biteDipOffset = this.easeOutCubic(Math.min(this.biteTime / 0.3, 1)) * 30;
        this.biteTilt = this.easeOutCubic(Math.min(this.biteTime / 0.3, 1)) * 0.12;
        if (this.biteTime >= 0.3) { this.bitePhase = 2; this.biteTime = 0; }
        break;
      case 2: // Submerge
        this.biteDipOffset = 30 + this.easeInOutCubic(Math.min(this.biteTime / 0.5, 1)) * 25;
        this.biteTilt = 0.12 + this.easeInOutCubic(Math.min(this.biteTime / 0.5, 1)) * 0.08;
        if (this.biteTime >= 0.5) { this.bitePhase = 3; this.biteTime = 0; }
        break;
      case 3: // Rise back
        const riseT = this.easeOutBounce(Math.min(this.biteTime / 0.8, 1));
        this.biteDipOffset = 55 * (1 - riseT);
        this.biteTilt = 0.2 * (1 - riseT);
        if (this.biteTime >= 0.8) { this.bitePhase = 4; this.biteTime = 0; }
        break;
      case 4: // Wobble settle
        const wobbleT = Math.min(this.biteTime / 1.2, 1);
        this.biteDipOffset = Math.sin(this.biteTime * 12) * 3 * (1 - wobbleT);
        this.biteTilt = Math.sin(this.biteTime * 10) * 0.02 * (1 - wobbleT);
        if (this.biteTime >= 1.2) { this.bitePhase = 0; this.biteDipOffset = 0; this.biteTilt = 0; }
        break;
    }
  }

  easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
  easeOutBounce(t) {
    if (t < 1/2.75) return 7.5625*t*t;
    if (t < 2/2.75) { t -= 1.5/2.75; return 7.5625*t*t+0.75; }
    if (t < 2.5/2.75) { t -= 2.25/2.75; return 7.5625*t*t+0.9375; }
    t -= 2.625/2.75; return 7.5625*t*t+0.984375;
  }

  draw() {
    const ctx = this.ctx;
    const w = this.w;
    const h = this.h;
    const cx = w / 2;
    ctx.clearRect(0, 0, w, h);

    const waterY = h * 0.6;
    const bob = Math.sin(this.bobTime * Math.PI) * 5;
    const extraDip = this.biteDipOffset;

    // Water — simple straight line
    ctx.fillStyle = 'rgba(42, 106, 126, 0.08)';
    ctx.fillRect(0, waterY, w, h - waterY);
    ctx.beginPath();
    ctx.moveTo(0, waterY);
    ctx.lineTo(w, waterY);
    ctx.strokeStyle = 'rgba(42, 106, 126, 0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // === FLOAT ===
    ctx.save();
    ctx.translate(cx, waterY - 2 + bob + extraDip);
    ctx.rotate(this.biteTilt);

    const fy = 0;

    // --- Antenna: long thin red stick with ball on top ---
    const antTop = fy - 65;
    const antBot = fy - 14;
    const stickW = 2.5;

    // Red stick
    ctx.beginPath();
    ctx.rect(-stickW / 2, antTop + 6, stickW, antBot - antTop - 6);
    ctx.fillStyle = '#C9302C';
    ctx.fill();

    // White stripe across
    const stripeY = antTop + (antBot - antTop) * 0.45;
    ctx.beginPath();
    ctx.rect(-stickW / 2 - 0.5, stripeY, stickW + 1, 3);
    ctx.fillStyle = '#F5F0E3';
    ctx.fill();

    // Red ball on top
    ctx.beginPath();
    ctx.arc(0, antTop + 6, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = '#C9302C';
    ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.arc(-1.5, antTop + 4.5, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fill();

    // --- Body: elongated teardrop ---
    // Red top (elongated oval)
    ctx.beginPath();
    ctx.ellipse(0, fy - 8, 8, 14, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#C9302C';
    ctx.fill();
    // Glossy
    ctx.beginPath();
    ctx.ellipse(-2, fy - 12, 2.5, 5, -0.15, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fill();

    // White bottom (slightly wider)
    ctx.beginPath();
    ctx.ellipse(0, fy + 8, 9, 13, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#F5F0E3';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, fy + 8, 9, 13, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Dividing line
    ctx.beginPath();
    ctx.moveTo(-9, fy);
    ctx.lineTo(9, fy);
    ctx.strokeStyle = 'rgba(140,133,118,0.4)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // --- Keel ---
    ctx.beginPath();
    ctx.moveTo(0, fy + 21);
    ctx.lineTo(0, fy + 32);
    ctx.strokeStyle = '#5C4D2F';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(0, fy + 33, 2.5, 1.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#3A3225';
    ctx.fill();

    // Fishing line (dashed)
    ctx.beginPath();
    ctx.setLineDash([2, 3]);
    ctx.moveTo(0, fy + 35);
    ctx.lineTo(0, fy + 50);
    ctx.strokeStyle = 'rgba(100,100,100,0.15)';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
  }

  destroy() { this.running = false; }
}

// === Canvas 1: Bite demo ===
const f1 = new FloatAnimator(document.getElementById('c1'));
const fill1 = document.getElementById('fill1');
let p1 = 0;
function tick1() {
  p1 += 0.004;
  if (p1 >= 1) p1 = 0;
  fill1.style.width = (p1 * 100) + '%';
  requestAnimationFrame(tick1);
}
tick1();

function triggerBite() { f1.triggerBite(); }
function togglePause() { f1.paused = !f1.paused; }

// === Canvas 2: Determinate ===
const f2 = new FloatAnimator(document.getElementById('c2'), { bobSpeed: 0.014 });
const fill2 = document.getElementById('fill2');
const label2 = document.getElementById('label2');

function animateDet() {
  let p = 0;
  fill2.style.width = '0%';
  label2.textContent = 'Подключение…';
  const iv = setInterval(() => {
    p += 0.01;
    if (p >= 0.3 && p < 0.32) { label2.textContent = 'Печать…'; f2.triggerBite(); }
    if (p >= 0.7 && p < 0.72) { label2.textContent = 'Отправка данных…'; }
    if (p >= 1) { p = 1; clearInterval(iv); label2.textContent = 'Чек отправлен ✓'; }
    fill2.style.width = (p * 100) + '%';
  }, 50);
}
</script>

</body>
</html>
