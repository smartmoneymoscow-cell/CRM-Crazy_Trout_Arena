<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crazy Trout Arena — Прелоадеры</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FBF6EC;font-family:"PT Sans",-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:48px 20px;color:#3a3530}
h1{font-size:24px;font-weight:800;margin-bottom:6px;color:#E8912B}
.sub{font-size:13px;color:#8C8576;margin-bottom:48px}
.row{display:flex;gap:48px;flex-wrap:wrap;justify-content:center}
.col{display:flex;flex-direction:column;align-items:center}
.demo-box{width:320px;height:200px;background:#fff;border-radius:18px;border:1px solid #EFE8D8;display:flex;align-items:center;justify-content:center;position:relative}
.label{margin-top:14px;font-size:13px;font-weight:700;color:#3a3530;text-align:center}
.label small{display:block;font-size:11px;font-weight:400;color:#8C8576;margin-top:2px}

/* ═══ Preloader 1: Reel — 80x75 ═══ */
.pl-reel{width:80px;height:75px;display:flex;flex-direction:column;align-items:center}
.pl-reel-video{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #E8912B;background:#F3EEE4}
.pl-reel-text{margin-top:8px;font-size:10px;font-weight:600;color:#8C8576}
.pl-reel-dots{display:flex;gap:4px;margin-top:4px}
.pl-reel-dots span{width:5px;height:5px;border-radius:50%;background:#E8912B;animation:dot 1.2s ease-in-out infinite}
.pl-reel-dots span:nth-child(2){animation-delay:.2s}
.pl-reel-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* ═══ Preloader 2: Carp — 80x75 ═══ */
.pl-carp{width:80px;height:75px;display:flex;flex-direction:column;align-items:center}
.pl-carp-video{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #E8912B;background:#F3EEE4}
.pl-carp-text{margin-top:8px;font-size:10px;font-weight:600;color:#8C8576}
.pl-carp-bar{margin-top:4px;width:48px;height:2px;background:#EFE8D8;border-radius:1px;overflow:hidden}
.pl-carp-bar-fill{height:100%;background:#E8912B;border-radius:1px;animation:bar 2s ease-in-out infinite}
@keyframes bar{0%{width:0}50%{width:100%}100%{width:0}}

/* ═══ Preloader 3: Float — 80x75 ═══ */
.pl-float{width:80px;height:75px;display:flex;flex-direction:column;align-items:center}
.pl-float-video{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #E8912B;background:#F3EEE4}
.pl-float-text{margin-top:8px;font-size:10px;font-weight:600;color:#8C8576}
.pl-float-anim{margin-top:3px;display:flex;align-items:flex-end;gap:2px;height:8px}
.pl-float-bar{width:3px;background:#E8912B;border-radius:1px;animation:wave 1.2s ease-in-out infinite}
.pl-float-bar:nth-child(1){height:4px;animation-delay:0s}
.pl-float-bar:nth-child(2){height:8px;animation-delay:.15s}
.pl-float-bar:nth-child(3){height:5px;animation-delay:.3s}
.pl-float-bar:nth-child(4){height:7px;animation-delay:.45s}
.pl-float-bar:nth-child(5){height:3px;animation-delay:.6s}
@keyframes wave{0%,100%{height:3px}50%{height:8px}}

/* ═══ Phone mockup (context) ═══ */
.phone{width:200px;height:400px;background:#111;border-radius:30px;padding:8px;box-shadow:0 12px 40px rgba(0,0,0,.2);position:relative;margin-top:32px}
.phone::after{content:"";position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:60px;height:3px;background:#333;border-radius:2px}
.phone-screen{width:100%;height:100%;background:#FBF6EC;border-radius:24px;overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:60px;height:16px;background:#111;border-radius:0 0 10px 10px;margin:0 auto}
.phone-content{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
.phone-content video{width:100%;height:100%;object-fit:cover;border-radius:12px}
.phone-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(251,246,236,.7);z-index:2}
</style>
</head>
<body>
<h1>🐟 Crazy Trout Arena</h1>
<p class="sub">Прелоадеры — 80×75 px (как FloatPreloader)</p>
<div class="row">

<!-- ═══ Variant 1: Reel ═══ -->
<div class="col">
<div class="demo-box">
  <div class="pl-reel">
    <video class="pl-reel-video" autoplay muted loop playsinline src="preloaders-assets/reel.mp4"></video>
    <div class="pl-reel-text">Загрузка…</div>
    <div class="pl-reel-dots"><span></span><span></span><span></span></div>
  </div>
</div>
<div class="label">1. Катушка<small>видео в круге + пульсирующие точки</small></div>
<div class="phone">
  <div class="phone-screen">
    <div class="phone-notch"></div>
    <div class="phone-content">
      <video autoplay muted loop playsinline src="preloaders-assets/carp.mp4"></video>
    </div>
    <div class="phone-overlay">
      <div class="pl-reel">
        <video class="pl-reel-video" autoplay muted loop playsinline src="preloaders-assets/reel.mp4"></video>
        <div class="pl-reel-text">Загрузка…</div>
        <div class="pl-reel-dots"><span></span><span></span><span></span></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ═══ Variant 2: Carp ═══ -->
<div class="col">
<div class="demo-box">
  <div class="pl-carp">
    <video class="pl-carp-video" autoplay muted loop playsinline src="preloaders-assets/carp.mp4"></video>
    <div class="pl-carp-text">Загрузка…</div>
    <div class="pl-carp-bar"><div class="pl-carp-bar-fill"></div></div>
  </div>
</div>
<div class="label">2. Карп<small>видео в круге + прогресс-бар</small></div>
<div class="phone">
  <div class="phone-screen">
    <div class="phone-notch"></div>
    <div class="phone-content">
      <video autoplay muted loop playsinline src="preloaders-assets/reel.mp4"></video>
    </div>
    <div class="phone-overlay">
      <div class="pl-carp">
        <video class="pl-carp-video" autoplay muted loop playsinline src="preloaders-assets/carp.mp4"></video>
        <div class="pl-carp-text">Загрузка…</div>
        <div class="pl-carp-bar"><div class="pl-carp-bar-fill"></div></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ═══ Variant 3: Float ═══ -->
<div class="col">
<div class="demo-box">
  <div class="pl-float">
    <video class="pl-float-video" autoplay muted loop playsinline src="preloaders-assets/float.mp4"></video>
    <div class="pl-float-text">Загрузка…</div>
    <div class="pl-float-anim">
      <div class="pl-float-bar"></div>
      <div class="pl-float-bar"></div>
      <div class="pl-float-bar"></div>
      <div class="pl-float-bar"></div>
      <div class="pl-float-bar"></div>
    </div>
  </div>
</div>
<div class="label">3. Поплавок<small>видео в круге + волновой индикатор</small></div>
<div class="phone">
  <div class="phone-screen">
    <div class="phone-notch"></div>
    <div class="phone-content">
      <video autoplay muted loop playsinline src="preloaders-assets/float.mp4"></video>
    </div>
    <div class="phone-overlay">
      <div class="pl-float">
        <video class="pl-float-video" autoplay muted loop playsinline src="preloaders-assets/float.mp4"></video>
        <div class="pl-float-text">Загрузка…</div>
        <div class="pl-float-anim">
          <div class="pl-float-bar"></div>
          <div class="pl-float-bar"></div>
          <div class="pl-float-bar"></div>
          <div class="pl-float-bar"></div>
          <div class="pl-float-bar"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

</div>
</body>
</html>
