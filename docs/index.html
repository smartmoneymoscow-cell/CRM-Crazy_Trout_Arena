  :root{
    --orange:#E89829;
    --ember:#886F11;
    --ink:#14130F;
    --paper:#FAF6EE;
    --teal:#2A6A7E;
    --green:#3FA66B;
    --gold:#D4A85A;
    --bone:#E3DCC9;
    --hair:#E7E0D1;
    --muted:#8C8576;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background:#DDD8CC;
    font-family:'Inter', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:48px;
    padding:44px 0;
  }

  .slide{
    width:794px;
    min-height:1123px;
    background:var(--paper);
    color:var(--ink);
    padding:56px 60px 48px;
    position:relative;
    display:flex;
    flex-direction:column;
    overflow:hidden;

  /* ---------- header ---------- */
  .brand{ display:flex; align-items:center; gap:10px; margin-bottom:30px; }
  .brand-dot{ width:13px; height:13px; border-radius:50%; background:var(--orange); flex-shrink:0; }
  .brand-name{ font-weight:800; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; }
  .brand-sub{ font-weight:600; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-left:2px; }
  .brand.on-dark .brand-name{ color:#fff; }
  .brand.on-dark .brand-sub{ color:#B7B2A2; }

  .eyebrow{ font-weight:700; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--orange); margin-bottom:10px; }
  h1{ font-family:'Inter Tight', sans-serif; font-weight:800; font-size:34px; line-height:1.12; letter-spacing:-0.01em; margin-bottom:18px; }
  .lede{ font-size:14px; line-height:1.6; color:#3a382f; max-width:640px; margin-bottom:26px; }
  .lede b{ color:var(--ink); font-weight:600; }

  .pagefoot{
    position:absolute; bottom:22px; left:64px; right:64px;
    display:flex; justify-content:space-between;
    font-size:10px; color:var(--muted);
    border-top:1px solid var(--hair); padding-top:10px;
  }
  .pagefoot.on-dark{ color:#8A8579; border-top-color:#232017; }

  /* ============ SLIDE 01 — COVER ============ */
  .slide-cover{
    background:var(--paper);
    align-items:center;
    justify-content:center;
    text-align:center;
  }
  .cover-logo-img{
    width:320px;
    height:auto;
    margin-bottom:36px;
  }
  .cover-rule{ width:48px; height:4px; background:var(--orange); margin-bottom:30px; border-radius:2px; }
  .cover-title{
    font-family:'Inter Tight', sans-serif;
    font-weight:800;
    font-size:50px;
    letter-spacing:-0.02em;
    margin-bottom:16px;
    line-height:1.1;
  }
  .cover-eyebrow{
    font-weight:800; font-size:13px; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--orange); margin-bottom:10px;
  }
  .cover-meta{ font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); font-weight:600; }

  
.toc-list{border-top:1px solid var(--hair);}
.toc-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--hair);font-size:12px;color:#3a382f;}
.toc-row b{font-family:'Inter Tight',sans-serif;font-weight:800;color:var(--ink);font-size:12px;letter-spacing:.02em;}

  /* ============ SLIDE 03 — TOKENS ============ */
  .tok-section-label{ font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .tok-colors{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:30px; }
  .tok-swatch{ border-radius:10px; overflow:hidden; border:1px solid var(--hair); }
  .tok-swatch .fill{ height:64px; }
  .tok-swatch .lab{ background:#fff; padding:9px 10px; }
  .tok-swatch .lab b{ display:block; font-size:11.5px; font-weight:700; }
  .tok-swatch .lab span{ font-size:9.5px; color:var(--muted); }

  .tok-type-row{ margin-bottom:14px; }
  .tok-type-meta{ font-size:9.5px; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:4px; }
  .tok-display{ font-family:'Inter Tight', sans-serif; font-weight:800; font-size:42px; line-height:1; }
  .tok-h1{ font-family:'Inter Tight', sans-serif; font-weight:800; font-size:24px; }
  .tok-body{ font-size:12px; color:#3a382f; }

  .tok-grid2{ display:grid; grid-template-columns:1fr 1fr; gap:30px; margin-top:22px; }
  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .btn{ font-size:12px; font-weight:700; border-radius:9px; padding:9px 16px; }
  .btn-primary{ background:var(--orange); color:#1B1505; }
  .btn-secondary{ background:var(--ink); color:#fff; }
  .btn-outline{ background:#fff; border:1px solid var(--hair); color:var(--ink); }
  .pill{ font-size:10.5px; font-weight:700; border-radius:20px; padding:5px 11px; }
  .pill-green{ background:#E1F1E6; color:var(--green); }
  .pill-orange{ background:#FBE8CC; color:var(--ember); }
  .pill-blue{ background:#DCEAEE; color:var(--teal); }

  .icon-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  .icon-tile{ height:38px; border:1px solid var(--hair); border-radius:9px; background:#fff; display:flex; align-items:center; justify-content:center; }
  .icon-tile svg{ width:16px; height:16px; stroke:var(--ink); stroke-width:1.7; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .tok-note{ font-size:11px; color:var(--muted); line-height:1.5; margin-top:10px; }

  /* ============ SLIDE 04 — ARCHITECTURE ============ */
  .arch-canvas{ position:relative; width:598px; height:640px; margin:22px auto 0; }
  .arch-col-label{ position:absolute; top:-28px; font-size:10px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase; color:var(--orange); }
  .arch-box{ position:absolute; border:1.5px solid var(--hair); border-radius:12px; background:#fff; padding:16px 16px; display:flex; flex-direction:column; justify-content:center; z-index:2; box-shadow:0 2px 6px rgba(20,19,15,0.06); }
  .arch-box b{ display:block; font-size:13px; font-weight:800; margin-bottom:6px; color:var(--ink); }
  .arch-box span{ font-size:10px; color:#6B6860; line-height:1.5; display:block; }
  .arch-core{ position:absolute; background:var(--ink); color:#fff; border-radius:14px; padding:20px 16px; text-align:center; display:flex; flex-direction:column; justify-content:center; z-index:2; box-shadow:0 4px 12px rgba(20,19,15,0.16); border:1.5px solid rgba(232,152,41,0.2); }
  .arch-core b{ display:block; font-size:14px; margin-bottom:8px; color:#fff; font-weight:800; }
  .arch-core span{ display:block; font-size:9.5px; color:#C9BFA9; line-height:1.6; }
  .arch-svg{ position:absolute; top:0; left:0; z-index:1; }
  .arch-edge-label{ position:absolute; font-size:9.5px; color:var(--orange); font-weight:700; background:var(--paper); padding:2px 6px; z-index:1; border-radius:4px; box-shadow:0 1px 3px rgba(20,19,15,0.04); }


.brand{ display:flex; align-items:center; gap:10px; margin-bottom:34px; }
.brand.on-dark .brand-sub{ color:#8A8579; }
h1{ font-family:'Inter Tight', sans-serif; font-weight:800; font-size:30px; line-height:1.16; letter-spacing:-0.01em; margin-bottom:10px; }
.pagefoot.on-dark{ color:#766F60; border-top-color:#262217; }
/* ============ SECTION DIVIDER (slide 05) ============ */
  .slide-section{ background:var(--ink) !important; color:#fff !important; justify-content:flex-start; }
.sec-number{ font-family:'Inter Tight', sans-serif; font-weight:800; font-size:120px; color:var(--orange); line-height:1; margin-bottom:12px; }
.sec-title{ font-family:'Inter Tight', sans-serif; font-weight:800; font-size:44px; line-height:1.14; color:#fff; max-width:580px; margin-bottom:20px; }
.sec-sub{ font-size:15px; line-height:1.65; color:#B8AE9C; max-width:520px; font-weight:500; }
.sec-block{ margin:auto 0; }
/* ============ PHONE COMPONENT ============ */
  .phones-row{ display:flex; justify-content:center; gap:42px; margin-top:16px; }
.phone-wrap{ width:240px; }
.phone-frame{
    border:10px solid var(--ink);
    border-radius:36px;
    overflow:hidden;
    background:#fff;
    box-shadow:0 18px 36px rgba(20,19,15,0.15);
  }
.phone-status{ display:flex; justify-content:space-between; align-items:center; padding:10px 16px 2px; font-size:9.5px; font-weight:700; }
.phone-dots{ display:flex; gap:3px; }
.phone-dots span{ width:3px; height:3px; border-radius:50%; background:#14130F; display:block; }
.phone-body{ padding:14px 17px 18px; min-height:auto; }
.phone-logo{ display:flex; justify-content:center; margin-bottom:10px; }
.phone-logo img{ width:86px; }
.phone-title{ font-family:'Inter Tight', sans-serif; font-weight:800; font-size:16px; margin-bottom:12px; }
.field-label{ font-size:8px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); font-weight:800; margin-bottom:5px; }
.field-input{ background:#FAF8F2; border:1.5px solid var(--hair); border-radius:9px; padding:9px 11px; font-size:10.5px; margin-bottom:12px; color:#3a382f; }
.btn-block{ width:100%; text-align:center; padding:11px; border-radius:9px; font-size:12px; font-weight:800; margin-bottom:10px; }
.btn-block.primary{ background:var(--orange); color:#1B1505; }
.btn-block.outline{ background:#fff; border:1.5px solid var(--hair); color:var(--ink); }
.link-center{ text-align:center; font-size:10px; color:var(--orange); font-weight:600; }
.link-center.muted{ color:var(--muted); font-weight:500; }
.caption-under{ text-align:center; margin-top:16px; }
.caption-under b{ display:block; font-family:'Inter Tight',sans-serif; font-size:14px; margin-bottom:3px; }
.caption-under span{ font-size:9px; letter-spacing:0.07em; text-transform:uppercase; color:var(--muted); }
/* code boxes */
  .code-row{ display:flex; gap:7px; margin-bottom:6px; }
.code-box{ width:33px; height:38px; border:1px solid var(--hair); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; background:#FAF8F2; color:#3a382f; }
.code-box.filled{ border-color:var(--orange); color:var(--orange); }
.code-box.empty{ color:var(--hair); }
.timer-note{ font-size:9.5px; color:var(--muted); margin-bottom:14px; }
/* password strength */
  .strength-row{ display:flex; gap:5px; margin-bottom:6px; }
.strength-seg{ flex:1; height:5px; border-radius:3px; background:var(--green); }
.strength-seg.off{ background:var(--hair); }
.strength-label{ font-size:9.5px; color:var(--green); font-weight:600; margin-bottom:14px; display:flex; align-items:center; gap:5px; }
.strength-label::before{ content:"●"; font-size:7px; }

.phone-body{ padding:14px 17px 18px; }

.ph-title{ font-family:'Inter Tight',sans-serif; font-weight:800; font-size:14px; }
.ph-grid-icon{ display:grid; grid-template-columns:repeat(3,4px); gap:2px; }

.legend{ display:flex; gap:12px; margin-bottom:12px; }
.legend-item{ display:flex; align-items:center; gap:5px; font-size:9.5px; }

@media print{
  @page{ size:794px 1123px; margin:0; }
  html,body{ background:var(--paper); }
  body{ padding:0; gap:0; }
  .slide{ box-shadow:none; page-break-after:always; break-after:page; margin:0 auto; }
  .slide:last-child{ page-break-after:auto; break-after:auto; }

  /* ============ SLIDE 09 — CLIENT PROFILE (MOBILE) ============ */
  .profile-card{ background:var(--ink); color:#fff; border-radius:14px; padding:14px 16px; margin-bottom:10px; }
  .profile-row{ display:flex; gap:10px; align-items:center; }
  .profile-avatar{ width:46px; height:46px; border-radius:50%; background:var(--orange); color:#1B1505; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; flex-shrink:0; overflow:hidden; }
  .profile-avatar img{ width:100%; height:100%; object-fit:cover; display:block; }
  .profile-name{ font-family:'Inter Tight', sans-serif; font-weight:800; font-size:14px; line-height:1.3; }
  .profile-meta{ font-size:9px; color:#B7B2A2; margin-top:2px; line-height:1.5; }
  .badge-pill{ display:inline-flex; align-items:center; gap:6px; border:1px solid rgba(232,152,41,.5); border-radius:20px; padding:3px 10px 3px 6px; font-size:9px; font-weight:700; margin-top:10px; color:var(--orange); }

<style>
  .rt-two{display:flex; gap:14px; align-items:stretch;}
  .rt-col{flex:1; min-width:0; display:flex; flex-direction:column;}
  .rt-col-title{font-family:'Inter Tight',sans-serif; font-weight:800; font-size:12.5px; color:var(--ink); margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; height:20px;}
  .rt-col-title .rt-sub{font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:700;}
  .rt-card{background:#fff; border:1px solid var(--hair); border-radius:11px; overflow:hidden; flex:1; display:flex; flex-direction:column;}

  /* shared row height */
  .rt-angler, .rt-catch{display:flex; align-items:center; gap:9px; padding:6px 11px; border-bottom:1px solid var(--hair); flex:0 0 auto; height:50px; box-sizing:border-box; overflow:hidden;}
  .rt-angler:last-child, .rt-catch:last-child{border-bottom:none;}
  .rt-angler.top, .rt-catch.top{background:linear-gradient(90deg, #FFF3DE 0%, #fff 60%);}

  /* anglers */
  .rt-rank{width:22px; height:22px; border-radius:50%; background:var(--bone); color:var(--ink); font-family:'Inter Tight',sans-serif; font-weight:800; font-size:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .rt-rank.gold{background:var(--orange); color:#1B1505;}
  .rt-rank.silver{background:#C9C0A9; color:#1B1505;}
  .rt-rank.bronze{background:#D8A97A; color:#1B1505;}
  .rt-av{width:32px; height:32px; border-radius:50%; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:11px; flex-shrink:0; letter-spacing:.02em; overflow:hidden;}
  .rt-av.a1{background:#2A6A7E;} .rt-av.a2{background:#8A5A12;} .rt-av.a3{background:#3FA66B;}
  .rt-av.a4{background:#5C4A8A;} .rt-av.a5{background:#B4522E;}
  .rt-av img{width:100%; height:100%; object-fit:cover; display:block;}
  .rt-info{flex:1; min-width:0; overflow:hidden;}
  .rt-name{font-size:11px; font-weight:700; color:var(--ink); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rt-meta{font-size:9px; color:var(--muted); margin-top:2px; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rt-stats{text-align:right; flex-shrink:0; font-variant-numeric:tabular-nums;}
  .rt-count{font-family:'Inter Tight',sans-serif; font-weight:800; font-size:14px; color:var(--ink); line-height:1;}
  .rt-count small{font-size:8.5px; color:var(--muted); font-weight:700; letter-spacing:.06em; margin-left:2px;}
  .rt-kg{font-size:10px; color:var(--orange); font-weight:700; margin-top:3px;}

  /* catches */
  .rt-fish{width:32px; height:32px; border-radius:9px; background:#F4EDD9; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; overflow:hidden;}
  .rt-fish.big{background:linear-gradient(135deg,#FFD79A,#E89829); font-size:21px;}
  .rt-fish img{width:28px; height:28px; object-fit:contain;}
  .rt-fn{font-size:11px; font-weight:700; color:var(--ink); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rt-fd{font-size:9px; color:var(--muted); margin-top:3px; letter-spacing:.02em; display:flex; gap:5px; align-items:center; flex-wrap:nowrap; white-space:nowrap; overflow:hidden;}
  .rt-fd .rt-dot{width:2px; height:2px; border-radius:50%; background:var(--muted); opacity:.6;}
  .rt-fd .rt-who{color:var(--ink); font-weight:600;}
  .rt-fw{font-family:'Inter Tight',sans-serif; font-weight:800; font-size:15px; color:var(--orange); line-height:1; text-align:right; font-variant-numeric:tabular-nums; flex-shrink:0;}
  .rt-fw small{font-size:9px; color:var(--muted); font-weight:700; margin-left:2px;}

  .rt-summary{display:flex; gap:10px; margin-top:8px;}
  .rt-sum-tile{flex:1; background:var(--ink); color:#fff; border-radius:10px; padding:7px 14px; text-align:center;}
  .rt-sum-tile.light{background:#fff; border:1px solid var(--hair); color:var(--ink);}
  .rt-sum-lbl{font-size:8.5px; letter-spacing:.08em; text-transform:uppercase; color:#8C8576; font-weight:700;}
  .rt-sum-tile.light .rt-sum-lbl{color:var(--muted);}
  .rt-sum-val{font-family:'Inter Tight',sans-serif; font-weight:800; font-size:18px; color:var(--orange); margin-top:3px; line-height:1; font-variant-numeric:tabular-nums;}
  .rt-sum-tile.light .rt-sum-val{color:var(--ink);}
  .rt-sum-val small{font-size:10px; color:#8C8576; font-weight:700; margin-left:3px; letter-spacing:.04em;}
  .rt-sum-tile.light .rt-sum-val small{color:var(--muted);}
</style>
<style>
  /* Bonuses page — compact fit for 640px browser frame */
  .bn-hero{display:flex;gap:10px;margin-bottom:10px;}
  .bn-balance{flex:1.15;background:var(--ink);color:#fff;border-radius:12px;padding:12px 14px;position:relative;overflow:hidden;}
  .bn-balance::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(232,152,41,.35),transparent 70%);}
  .bn-eyebrow{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);font-weight:800;display:flex;align-items:center;gap:4px;}
  .bn-balance-val{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:32px;line-height:1;margin-top:4px;letter-spacing:-.5px;}
  .bn-balance-val small{font-size:11px;color:#8C8576;font-weight:700;margin-left:5px;letter-spacing:0;}
  .bn-balance-meta{font-size:9px;color:#8C8576;margin-top:4px;letter-spacing:.02em;}
  .bn-balance-meta b{color:#fff;font-weight:700;}
  .bn-progress-wrap{margin-top:9px;position:relative;z-index:1;}
  .bn-progress-row{display:flex;justify-content:space-between;font-size:9px;color:#8C8576;margin-bottom:4px;font-weight:700;letter-spacing:.03em;}
  .bn-progress-row b{color:#fff;}
  .bn-progress{height:5px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;}
  .bn-progress > i{display:block;height:100%;width:80%;background:linear-gradient(90deg,var(--orange),#F5C34A);border-radius:3px;}

  .bn-stats{flex:1;display:flex;flex-direction:column;gap:6px;}
  .bn-stat{background:#fff;border:1px solid var(--hair);border-radius:10px;padding:7px 10px;display:flex;align-items:center;gap:8px;flex:1;}
  .bn-stat .ico{width:26px;height:26px;border-radius:8px;background:#FFF1DD;color:#8A5A12;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .bn-stat .ico.g{background:#E6F4EA;color:#2F8552;}
  .bn-stat .ico.b{background:#EAF1F6;color:#2A6A7E;}
  .bn-stat-lbl{font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .bn-stat-val{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:13px;color:var(--ink);line-height:1.1;margin-top:1px;}
  .bn-stat-val small{color:var(--muted);font-weight:700;font-size:8.5px;margin-left:2px;}

  .bn-section-title{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:11.5px;color:var(--ink);margin:0 0 6px;display:flex;align-items:center;justify-content:space-between;}
  .bn-section-title .bn-sub{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;}

  .bn-prizes{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
  .bn-prize{background:#fff;border:1px solid var(--hair);border-radius:10px;padding:8px 8px 7px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
  .bn-prize.locked{opacity:.72;}
  .bn-prize .hot{position:absolute;top:5px;right:5px;background:var(--orange);color:#1B1505;font-size:7.5px;font-weight:800;letter-spacing:.06em;padding:2px 5px;border-radius:5px;text-transform:uppercase;}
  .bn-prize-ico{width:100%;aspect-ratio:1/1;border-radius:7px;background:linear-gradient(135deg,#FAF3E0,#F0E6CC);overflow:hidden;margin-bottom:6px;position:relative;}
  .bn-prize-ico img{width:100%;height:100%;object-fit:cover;display:block;}
  .bn-prize-brand{font-size:7.5px;font-weight:800;letter-spacing:.12em;color:#8A5A12;text-transform:uppercase;}
  .bn-prize-name{font-size:9px;font-weight:700;color:var(--ink);line-height:1.2;min-height:22px;margin-top:2px;}
  .bn-prize-cost{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:12px;color:var(--orange);margin-top:5px;line-height:1;display:flex;align-items:baseline;gap:2px;}
  .bn-prize-cost small{font-size:8px;color:var(--muted);font-weight:700;}
  .bn-prize.locked .bn-prize-cost{color:var(--muted);}

  .bn-lower{display:flex;gap:10px;}
  .bn-feed{flex:1.15;background:#fff;border:1px solid var(--hair);border-radius:10px;padding:9px 10px;}
  .bn-feed-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px dashed var(--hair);}
  .bn-feed-item:last-child{border-bottom:none;}
  .bn-feed-ico{width:22px;height:22px;border-radius:7px;background:#F4EDD9;color:#8A5A12;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
  .bn-feed-ico.red{background:#FBE9E9;color:#B04B4B;}
  .bn-feed-ico.g{background:#E6F4EA;color:#2F8552;}
  .bn-feed-info{flex:1;min-width:0;}
  .bn-feed-t{font-size:9.5px;font-weight:700;color:var(--ink);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bn-feed-m{font-size:8px;color:var(--muted);margin-top:1px;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bn-feed-amt{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:11px;color:#2F8552;font-variant-numeric:tabular-nums;flex-shrink:0;}
  .bn-feed-amt.neg{color:var(--muted);}

  .bn-rules{flex:1;background:linear-gradient(160deg,#FFF6E5,#FFEBC7);border:1px solid #F0D89A;border-radius:10px;padding:10px 11px;}
  .bn-rule{display:flex;gap:7px;align-items:flex-start;padding:4px 0;border-bottom:1px dashed rgba(138,90,18,.18);}
  .bn-rule:last-child{border-bottom:none;}
  .bn-rule-ico{width:20px;height:20px;border-radius:6px;background:#fff;color:#8A5A12;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;}
  .bn-rule-t{font-size:9.5px;font-weight:700;color:var(--ink);line-height:1.2;}
  .bn-rule-m{font-size:8.5px;color:#8A5A12;margin-top:1px;font-weight:600;}
