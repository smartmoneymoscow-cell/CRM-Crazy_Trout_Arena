<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crazy Trout Arena — Профиль клиента</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #E89829;
  --ink: #14130F;
  --paper: #FAF6EE;
  --green: #3FA66B;
  --gold: #D4A85A;
  --hair: #E7E0D1;
  --muted: #8C8576;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #DDD8CC;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 40px 20px;
}

/* === iPhone 15 Pro Max: 430x932, screen ~430x896 === */
.iphone-mockup {
  width: 430px;
  height: 932px;
  background: #000;
  border-radius: 55px;
  border: 3px solid #1a1a1a;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05) inset;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Dynamic Island */
.dynamic-island {
  width: 126px;
  height: 37px;
  background: #000;
  border-radius: 20px;
  margin: 12px auto 0;
  position: relative;
  z-index: 10;
}

/* Status bar */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 30px 0;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
}
.status-icons {
  display: flex;
  gap: 6px;
  align-items: center;
}
.status-icons svg { width: 18px; height: 18px; }

/* Screen content */
.screen {
  flex: 1;
  background: #fff;
  margin: 0;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
}

/* Profile card */
.profile-card {
  background: var(--ink);
  color: #fff;
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 14px;
  position: relative;
}
.profile-edit {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: rgba(232,152,41,.18);
  display: flex;
  align-items: center;
  justify-content: center;
}
.profile-edit svg { width: 16px; height: 16px; color: var(--orange); }
.profile-row {
  display: flex;
  gap: 14px;
  align-items: center;
}
.profile-avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  border: 2px solid rgba(232,152,41,0.3);
}
.profile-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.profile-name {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 800;
  font-size: 20px;
  line-height: 1.3;
  margin-bottom: 4px;
}
.profile-meta {
  font-size: 13px;
  color: #B7B2A2;
  line-height: 1.5;
}
.badge-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(232,152,41,.5);
  border-radius: 24px;
  padding: 6px 14px 6px 10px;
  font-size: 13px;
  font-weight: 700;
  margin-top: 14px;
  color: var(--orange);
}
.badge-pill svg { display: block; }

/* Stats */
.profile-stats {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}
.profile-stat {
  flex: 1;
  background: #fff;
  border: 1.5px solid var(--hair);
  border-radius: 16px;
  padding: 14px 8px;
  text-align: center;
}
.profile-stat b {
  display: block;
  font-family: 'Inter Tight', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 4px;
}
.profile-stat span {
  font-size: 10px;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
}

/* Catch card */
.catch-card {
  background: var(--orange);
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 14px;
  color: #1B1505;
}
.catch-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.catch-image-wrap {
  background: transparent;
  border-radius: 10px;
  margin-bottom: 12px;
  text-align: center;
}
.catch-image {
  width: 70%;
  display: block;
  margin: 0 auto;
}
.catch-body {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.catch-name {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 800;
  font-size: 22px;
}
.catch-weight {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 800;
  font-size: 20px;
}

/* Statistics */
.stat-list-title {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.stat-list-title svg {
  width: 14px;
  height: 14px;
  stroke: var(--muted);
  fill: none;
  stroke-width: 1.7;
}
.stat-list-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--hair);
  padding: 10px 0;
  font-size: 14px;
}
.stat-list-row .slr-name { font-weight: 700; color: var(--ink); }
.stat-list-row .slr-count { font-weight: 800; width: 28px; color: var(--ink); }
.stat-list-row .slr-avg { color: var(--muted); font-size: 12px; }

/* Bottom nav */
.nav-bar {
  display: flex;
  border-top: 1px solid var(--hair);
  padding: 12px 0 28px;
  background: #fff;
  flex-shrink: 0;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
}
.nav-item.active { color: var(--orange); }
.nav-item svg { width: 20px; height: 20px; }
</style>
</head>
<body>

<div class="iphone-mockup">
  <div class="dynamic-island"></div>
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div class="screen">
    <!-- Profile card -->
    <div class="profile-card">
      <div class="profile-edit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
      </div>
      <div class="profile-row">
        <div class="profile-avatar"><img src="assets/img_002.jpeg" alt="Уэйд Джереми"></div>
        <div style="flex:1;">
          <div class="profile-name">Уэйд Джереми</div>
          <div class="profile-meta">+7 999 000-00-00<br>wade@mail.ru</div>
        </div>
        <div style="width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="4" height="4"/><line x1="22" y1="14" x2="22" y2="14.01"/><line x1="18" y1="22" x2="18" y2="22.01"/><line x1="22" y1="18" x2="22" y2="22"/></svg>
        </div>
      </div>
      <div class="badge-pill">
        <svg width="18" height="20" viewBox="0 0 16 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 0h2.4L4.6 4.2 2.2 3.6 4 0zM11.4 0H9L10.8 4.2l2.4-.6L11.4 0z" fill="#C9302C"/><path d="M4.6 4.2 2.2 3.6 5 6.8l1.6-2.6H4.6zM10.8 4.2 13.2 3.6 10.4 6.8 8.8 4.2h2z" fill="#8A1E1B"/><circle cx="8" cy="11.5" r="5.2" fill="url(#silverG)" stroke="#8C8576" stroke-width="0.6"/><circle cx="8" cy="11.5" r="3.4" fill="none" stroke="#8C8576" stroke-width="0.4" opacity=".6"/><path d="M8 8.6l.7 1.9h1.9l-1.55 1.15.6 1.9L8 12.4l-1.65 1.15.6-1.9L5.4 10.5h1.9L8 8.6z" fill="#F3EEDF"/><defs><radialGradient id="silverG" cx="0.35" cy="0.3" r="0.9"><stop offset="0" stop-color="#F7F4EA"/><stop offset="0.55" stop-color="#CFC6B0"/><stop offset="1" stop-color="#8C8576"/></radialGradient></defs></svg>
        Серебряный рыболов
      </div>
    </div>

    <!-- Stats -->
    <div class="profile-stats">
      <div class="profile-stat"><b>24</b><span>Посещений</span></div>
      <div class="profile-stat"><b>68</b><span>Рыб</span></div>
      <div class="profile-stat"><b>1840</b><span>Баллов</span></div>
    </div>

    <!-- Catch card -->
    <div class="catch-card">
      <div class="catch-badge">🏆 Лучший улов</div>
      <div class="catch-image-wrap">
        <img class="catch-image" src="assets/img_003.png" alt="Осётр">
      </div>
      <div class="catch-body">
        <div class="catch-name">Осётр</div>
        <div class="catch-weight">5,8 кг</div>
      </div>
    </div>

    <!-- Statistics -->
    <div class="stat-list-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l6-3.5v11L16 14"/></svg>
      Статистика
    </div>
    <div class="stat-list-row">
      <span class="slr-count">4</span>
      <span class="slr-name">Осётр</span>
      <span class="slr-avg">ср. 3,2 кг</span>
    </div>
    <div class="stat-list-row">
      <span class="slr-count">12</span>
      <span class="slr-name">Карп</span>
      <span class="slr-avg">ср. 1,8 кг</span>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="nav-bar">
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4L3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/></svg>
      Карта
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg>
      Бронирование
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c1.5-4 4.5-5.5 7-5.5s5.5 1.5 7 5.5"/></svg>
      Профиль
    </div>
  </div>
</div>

</body>
</html>
