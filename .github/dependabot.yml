version: 2
updates:
  # Flutter/Dart зависимости (pubspec.yaml)
  - package-ecosystem: "pub"
    directory: "/flutter-app/crazytrout_admin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci"
