name: PR Checks

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter-app/crazytrout_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'
          cache: true

      - name: Генерация обёрток проекта
        run: flutter create . --platforms=android,ios --project-name=crazytrout_admin --org=com.crazytroutarena

      - name: Установка зависимостей
        run: flutter pub get

      - name: Проверка ассетов
        run: |
          MISSING=0
          while IFS= read -r ref; do
            path=$(echo "$ref" | grep -oP "assets/[^'\"]+")
            if [ -n "$path" ] && [ ! -f "$path" ]; then
              echo "❌ MISSING: $path"
              MISSING=$((MISSING + 1))
            fi
          done < <(grep -rh --include='*.dart' -oP "assets/[^'\"]+\.\(png\|jpeg\|jpg\|gif\|svg\|webp\|ttf\|otf\)" lib/ | sort -u)
          if [ "$MISSING" -gt 0 ]; then
            echo "🔴 $MISSING ассетов не найдено!"
            exit 1
          fi
          echo "✅ Все ассеты на месте"

      - name: Анализ кода (flutter analyze)
        run: flutter analyze --fatal-infos

      - name: Запуск тестов с coverage
        run: flutter test --coverage

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            TOTAL=$(grep -c "^SF:" coverage/lcov.info || echo 0)
            LINES=$(grep -c "^DA:" coverage/lcov.info || echo 0)
            HIT=$(grep "^DA:" coverage/lcov.info | grep -v ",0$" | wc -l)
            if [ "$LINES" -gt 0 ]; then
              PCT=$((HIT * 100 / LINES))
              echo "📊 Coverage: ${PCT}% ($HIT/$LINES lines in $TOTAL files)"
            fi
          fi
