name: Build APK & IPA

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

# Отмена предыдущих запусков при новом пуше
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Android APK
  # ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter-app/crazytrout_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Генерация обёрток проекта (Android + iOS)
        run: flutter create . --platforms=android,ios --project-name=crazytrout_admin --org=com.crazytroutarena

      - name: Красивое название приложения
        run: sed -i 's/android:label="crazytrout_admin"/android:label="Crazy Trout"/g' android/app/src/main/AndroidManifest.xml

      - name: Разрешения Bluetooth + Камера
        run: |
          sed -i '/<manifest /a \
              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.CAMERA" />' \
            android/app/src/main/AndroidManifest.xml

      - name: Гарантировать minifyEnabled/shrinkResources в release (Groovy или Kotlin DSL)
        run: |
          python3 << 'PYEOF'
          import re, pathlib

          groovy = pathlib.Path('android/app/build.gradle')
          kts = pathlib.Path('android/app/build.gradle.kts')
          path = kts if kts.exists() else groovy
          text = path.read_text()

          if 'minifyEnabled' in text or 'isMinifyEnabled' in text:
              print(f'{path}: minify уже настроен явно, не трогаю')
          elif path == kts:
              # Kotlin DSL: release { signingConfig = ... }
              new_release = (
                  'release {\n'
                  '            signingConfig = signingConfigs.getByName("debug")\n'
                  '            isMinifyEnabled = true\n'
                  '            isShrinkResources = true\n'
                  '            proguardFiles(\n'
                  '                getDefaultProguardFile("proguard-android-optimize.txt"),\n'
                  '                "proguard-rules.pro"\n'
                  '            )\n'
                  '        }'
              )
              text2 = re.sub(r'release\s*\{[^}]*\}', new_release, text, count=1, flags=re.S)
              path.write_text(text2)
              print(f'{path}: добавлены minify/shrink/proguardFiles (Kotlin DSL)')
          else:
              # Groovy: release { signingConfig ... }
              new_release = (
                  'release {\n'
                  '            signingConfig signingConfigs.debug\n'
                  '            minifyEnabled true\n'
                  '            shrinkResources true\n'
                  '            proguardFiles getDefaultProguardFile(\'proguard-android-optimize.txt\'), \'proguard-rules.pro\'\n'
                  '        }'
              )
              text2 = re.sub(r'release\s*\{[^}]*\}', new_release, text, count=1, flags=re.S)
              path.write_text(text2)
              print(f'{path}: добавлены minify/shrink/proguardFiles (Groovy)')
          PYEOF
          echo "--- итоговый release-блок ---"
          grep -A8 "release {" android/app/build.gradle.kts 2>/dev/null || grep -A8 "release {" android/app/build.gradle

      - name: ProGuard-правила (R8 в релизе иначе ломает плагины через рефлексию)
        # Раньше здесь были keep-правила только для mobile_scanner — но R8
        # в минифицированной сборке точно так же может обфусцировать/вырезать
        # классы ЛЮБОГО плагина без явного keep-правила, включая сам
        # механизм регистрации плагинов Flutter (GeneratedPluginRegistrant),
        # который вызывается СРАЗУ при старте приложения — то есть без
        # базового "io.flutter.**" правила крэш происходит уже при попытке
        # открыть приложение, а не только при использовании конкретного
        # плагина. Добавлены недостающие правила для flutter_blue_plus,
        # printing/pdf и permission_handler, плюс обязательный базовый набор.
        run: |
          cat >> android/app/proguard-rules.pro << 'EOF'

          # --- Базовые правила Flutter embedding (обязательны при minifyEnabled) ---
          -keep class io.flutter.app.** { *; }
          -keep class io.flutter.plugin.** { *; }
          -keep class io.flutter.util.** { *; }
          -keep class io.flutter.view.** { *; }
          -keep class io.flutter.** { *; }
          -keep class io.flutter.plugins.** { *; }
          -dontwarn io.flutter.embedding.**

          # --- mobile_scanner / CameraX / ML Kit Barcode Scanning ---
          -keep class dev.steenbakker.mobile_scanner.** { *; }
          -keep class com.google.mlkit.vision.barcode.** { *; }
          -keep class com.google.mlkit.vision.codescanner.** { *; }
          -keep class com.google.mlkit.vision.common.** { *; }
          -keep class com.google.android.gms.internal.mlkit_vision_barcode.** { *; }
          -keep class com.google.android.gms.internal.mlkit_vision_common.** { *; }
          -keep class androidx.camera.** { *; }
          -dontwarn com.google.mlkit.**
          -dontwarn com.google.android.gms.internal.mlkit_vision_barcode.**
          -dontwarn com.google.android.gms.internal.mlkit_vision_common.**
          -dontwarn androidx.camera.**

          # --- flutter_blue_plus (Bluetooth-печать) ---
          -keep class com.lib.flutter_blue_plus.** { *; }
          -dontwarn com.lib.flutter_blue_plus.**

          # --- printing / pdf (системный диалог печати) ---
          -keep class net.nfet.flutter.printing.** { *; }
          -dontwarn net.nfet.flutter.printing.**

          # --- permission_handler ---
          -keep class com.baseflow.permissionhandler.** { *; }
          -dontwarn com.baseflow.permissionhandler.**
          EOF

      - name: Установка зависимостей
        run: flutter pub get

      - name: Генерация иконки приложения из логотипа
        run: dart run flutter_launcher_icons

      - name: Запуск тестов
        run: flutter test

      # --target-platform android-arm64 режет только движок Flutter и Dart-код,
      # но НЕ нативные библиотеки плагинов (например, сканер штрихкодов
      # добавляет .so под arm64+armv7+x86_64 разом, +12 МБ лишнего). Поэтому
      # используем --split-per-abi и берём только arm64-сборку явно.
      - name: Сборка релизного APK (split-per-abi, только arm64)
        run: |
          flutter build apk --release --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/app-release.apk

      - name: Публикация APK как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-release.apk

  # ──────────────────────────────────────────────
  # iOS IPA (требует macOS-раннер)
  # ──────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter-app/crazytrout_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Генерация обёрток проекта (Android + iOS)
        run: flutter create . --platforms=android,ios --project-name=crazytrout_admin --org=com.crazytroutarena

      - name: Установка зависимостей
        run: flutter pub get

      - name: Разрешения iOS (Info.plist)
        run: |
          PLIST=ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Для сканирования QR-кодов клиентов'" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothAlwaysUsageDescription string 'Для печати чеков через Bluetooth-принтер'" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothPeripheralUsageDescription string 'Для печати чеков через Bluetooth-принтер'" $PLIST || true

      - name: Минимальная версия iOS 13.0
        run: sed -i '' 's/platform :ios, .*/platform :ios, '"'"'13.0'"'"'/g' ios/Podfile

      - name: Генерация иконки приложения из логотипа
        run: dart run flutter_launcher_icons

      - name: Запуск тестов
        run: flutter test

      - name: Сборка iOS без кодирования (no-codesign)
        run: flutter build ios --release --no-codesign

      - name: Создание IPA из .app
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-release.ipa Payload
          rm -rf Payload

      - name: Публикация IPA как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: flutter-app/crazytrout_admin/app-release.ipa

  # ──────────────────────────────────────────────
  # Релиз — создаётся ОДИН раз после обоих билдов
  # ──────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/apk

      - name: Скачивание IPA
        uses: actions/download-artifact@v4
        with:
          name: app-release-ipa
          path: artifacts/ipa

      - name: Создание GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/apk/app-release.apk
            artifacts/ipa/app-release.ipa
