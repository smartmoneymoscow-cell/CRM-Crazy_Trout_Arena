name: Build APK & IPA

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

# Отмена предыдущих запусков при новом пуше
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Android APK
  # ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter-app/crazytrout_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Генерация обёрток проекта (Android + iOS)
        run: flutter create . --platforms=android,ios --project-name=crazytrout_admin --org=com.crazytroutarena

      # ВАЖНО: без этого шага каждый CI-ран получает СВОЙ debug.keystore
      # (генерируется Gradle с нуля на чистой машине), а значит каждый
      # следующий APK подписан ДРУГИМ ключом. Android при установке видит
      # смену подписи и требует "удалите предыдущую версию" — обновление
      # поверх старой версии становится невозможным. Кэшируем keystore по
      # фиксированному ключу, чтобы он был одним и тем же между релизами.
      - name: Кэш debug-keystore (стабильная подпись между релизами)
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Красивое название приложения
        run: sed -i 's/android:label="crazytrout_admin"/android:label="Crazy Trout"/g' android/app/src/main/AndroidManifest.xml

      - name: Разрешения Bluetooth + Камера
        run: |
          sed -i '/<manifest /a \
              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.CAMERA" />' \
            android/app/src/main/AndroidManifest.xml

      - name: Отключить R8 (minify) в release сборке
        # Flutter 3.44 генерирует build.gradle.kts с isMinifyEnabled = true.
        # R8 без корректных ProGuard-правил вырезает ML Kit DI → краш при старте.
        # Отключаем minify — приложение маленькое, выигрыш от R8 незначителен.
        run: |
          sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/g' android/app/build.gradle.kts
          echo "--- release block после патча ---"
          grep -A10 "release" android/app/build.gradle.kts | head -15

      - name: Sentry native DSN (ловит краши ДО старта Dart/Flutter)
        # SentryFlutter.init() в main.dart выполняется уже ПОСЛЕ старта
        # Flutter-движка — если краш нативный и происходит раньше, Dart-level
        # init просто не успевает. meta-data в AndroidManifest заставляет
        # нативный слой Sentry (Android SDK) стартовать в момент запуска
        # процесса приложения, независимо от того, дошло ли дело до Dart.
        #
        # Тег <application> в шаблоне flutter create многострочный
        # (атрибуты на отдельных строках), поэтому вставляем через python
        # regex по первому ">", закрывающему открывающий тег — построчный
        # sed здесь ломает XML (проверено локально перед пушем).
        run: |
          python3 << 'PYEOF'
          import re
          path = 'android/app/src/main/AndroidManifest.xml'
          text = open(path).read()
          meta = (
              '\n        <meta-data android:name="io.sentry.dsn" '
              'android:value="https://497130229ebbe402ac2995fa888709cd@o4511723482382336.ingest.us.sentry.io/4511723747278848" />'
              '\n        <meta-data android:name="io.sentry.anr.enable" android:value="true" />'
              '\n        <meta-data android:name="io.sentry.attach-anr-thread-dump" android:value="true" />'
          )
          match = re.search(r'<application\b[^>]*>', text, flags=re.S)
          if not match:
              raise SystemExit('Тег <application> не найден в AndroidManifest.xml!')
          pos = match.end()
          open(path, 'w').write(text[:pos] + meta + text[pos:])
          print('Sentry native DSN добавлен')
          PYEOF

      - name: Установка зависимостей
        run: flutter pub get

      - name: Генерация иконки приложения из логотипа
        run: dart run flutter_launcher_icons

      - name: Запуск тестов
        run: flutter test

      # --target-platform android-arm64 режет только движок Flutter и Dart-код,
      # но НЕ нативные библиотеки плагинов (например, сканер штрихкодов
      # добавляет .so под arm64+armv7+x86_64 разом, +12 МБ лишнего). Поэтому
      # используем --split-per-abi и берём только arm64-сборку явно.
      - name: Сборка релизного APK (split-per-abi, только arm64)
        run: |
          flutter build apk --release --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/app-release.apk

      - name: Публикация APK как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-release.apk

  # ──────────────────────────────────────────────
  # iOS IPA (требует macOS-раннер)
  # ──────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    # Раньше падение этого job'а (macOS-раннеры менее стабильны, а IPA всё
    # равно unsigned и не устанавливается на обычный iPhone) блокировало
    # весь релиз через "needs: [build-android, build-ios]" ниже — Android
    # мог быть собран идеально, а релиз просто не создавался. Теперь
    # неудача iOS не мешает выпуску Android-релиза.
    continue-on-error: true
    defaults:
      run:
        working-directory: flutter-app/crazytrout_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Генерация обёрток проекта (Android + iOS)
        run: flutter create . --platforms=android,ios --project-name=crazytrout_admin --org=com.crazytroutarena

      - name: Установка зависимостей
        run: flutter pub get

      - name: Разрешения iOS (Info.plist)
        run: |
          PLIST=ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Для сканирования QR-кодов клиентов'" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothAlwaysUsageDescription string 'Для печати чеков через Bluetooth-принтер'" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothPeripheralUsageDescription string 'Для печати чеков через Bluetooth-принтер'" $PLIST || true

      - name: Минимальная версия iOS 13.0
        run: sed -i '' 's/platform :ios, .*/platform :ios, '"'"'13.0'"'"'/g' ios/Podfile

      - name: Генерация иконки приложения из логотипа
        run: dart run flutter_launcher_icons

      - name: Запуск тестов
        run: flutter test

      - name: Сборка iOS без кодирования (no-codesign)
        run: flutter build ios --release --no-codesign

      - name: Создание IPA из .app
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-release.ipa Payload
          rm -rf Payload

      - name: Публикация IPA как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: flutter-app/crazytrout_admin/app-release.ipa

  # ──────────────────────────────────────────────
  # Релиз — создаётся ОДИН раз после обоих билдов
  # ──────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/apk

      - name: Скачивание IPA (необязательно — iOS может не собраться)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: app-release-ipa
          path: artifacts/ipa

      - name: Создание GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Wildcard вместо точного имени файла: если IPA не скачался
          # (iOS job упал), softprops просто не найдёт файлов по маске
          # и не уронит релиз из-за отсутствующего пути.
          files: |
            artifacts/apk/app-release.apk
            artifacts/ipa/*.ipa
