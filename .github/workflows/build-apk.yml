name: Build Android APK

# Собирает настоящий APK на серверах GitHub — не нужно ставить Android Studio
# или Flutter SDK локально.
#
# Два способа получить файл:
# 1) Push в main / ручной запуск → APK лежит во вкладке "Actions" → выбранный
#    запуск → "Artifacts" (нужен вход в GitHub, хранится 90 дней).
# 2) Push тега вида v1.0.0 → создаётся GitHub Release с APK — постоянная
#    публичная ссылка вида:
#    https://github.com/<пользователь>/<репозиторий>/releases/download/v1.0.0/app-release.apk

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}   # позволяет запускать вручную кнопкой Run workflow

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter-app/crazytrout_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Генерация Android-обёртки проекта (android/ отсутствует в репо)
        run: flutter create . --platforms=android,ios --project-name=crazytrout_admin --org=com.crazytroutarena

      - name: Установка зависимостей
        run: flutter pub get

      - name: Генерация иконки приложения из логотипа
        run: flutter pub run flutter_launcher_icons

      - name: Запуск тестов
        run: flutter test

      - name: Сборка релизного APK (split per ABI — ~15 МБ каждая)
        run: flutter build apk --release --split-per-abi

      - name: Публикация APK как артефактов
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Публикация постоянной ссылки (только при пуше тега vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-x86_64-release.apk
