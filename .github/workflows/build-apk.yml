name: Build APK & IPA

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

# Отмена предыдущих запусков при новом пуше
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Android APK
  # ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter-app/crazytrout_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Генерация обёрток проекта (Android + iOS)
        run: flutter create . --platforms=android,ios --project-name=crazytrout_admin --org=com.crazytroutarena

      - name: Красивое название приложения
        run: sed -i 's/android:label="crazytrout_admin"/android:label="Crazy Trout"/g' android/app/src/main/AndroidManifest.xml

      - name: Разрешения Bluetooth + Камера
        run: |
          sed -i '/<manifest /a \
              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.CAMERA" />' \
            android/app/src/main/AndroidManifest.xml

      - name: ProGuard-правила для mobile_scanner (иначе release ломает сканер QR)
        # R8 в релизной сборке обфусцирует/вырезает классы CameraX и ML Kit
        # Barcode Scanning, к которым mobile_scanner обращается через
        # рефлексию при старте камеры. Без keep-правил это падает с
        # "MobileScannerException: genericError ... on a null object
        # reference" сразу при открытии экрана сканера — в debug-сборке
        # (minifyEnabled=false) всё работает, поэтому баг незаметен локально
        # и проявляется только в релизном APK.
        run: |
          cat >> android/app/proguard-rules.pro << 'EOF'

          # --- mobile_scanner / CameraX / ML Kit Barcode Scanning ---
          -keep class dev.steenbakker.mobile_scanner.** { *; }
          -keep class com.google.mlkit.vision.barcode.** { *; }
          -keep class com.google.mlkit.vision.codescanner.** { *; }
          -keep class com.google.mlkit.vision.common.** { *; }
          -keep class com.google.android.gms.internal.mlkit_vision_barcode.** { *; }
          -keep class com.google.android.gms.internal.mlkit_vision_common.** { *; }
          -keep class androidx.camera.** { *; }
          -dontwarn com.google.mlkit.**
          -dontwarn com.google.android.gms.internal.mlkit_vision_barcode.**
          -dontwarn com.google.android.gms.internal.mlkit_vision_common.**
          -dontwarn androidx.camera.**
          EOF

      - name: Явное включение R8 + подключение proguard-rules.pro в release
        # На случай, если сгенерированный flutter create build.gradle.kts
        # не подключает минификацию/proguard-rules.pro явно — прописываем
        # это гарантированно, чтобы правила выше точно применялись.
        run: |
          python3 - << 'PYEOF'
          import re
          path = "android/app/build.gradle.kts"
          with open(path, encoding="utf-8") as f:
              content = f.read()

          if "isMinifyEnabled" not in content:
              content = re.sub(
                  r"(release\s*\{)",
                  r"\1\n            isMinifyEnabled = true\n"
                  r"            isShrinkResources = true\n"
                  r"            proguardFiles(\n"
                  r'                getDefaultProguardFile("proguard-android-optimize.txt"),\n'
                  r'                "proguard-rules.pro"\n'
                  r"            )",
                  content,
                  count=1,
              )
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)
              print("Добавлены isMinifyEnabled/proguardFiles в build.gradle.kts")
          else:
              print("isMinifyEnabled уже присутствует, пропускаем")
          PYEOF

      - name: Установка зависимостей
        run: flutter pub get

      - name: Генерация иконки приложения из логотипа
        run: dart run flutter_launcher_icons

      - name: Запуск тестов
        run: flutter test

      # --target-platform android-arm64 режет только движок Flutter и Dart-код,
      # но НЕ нативные библиотеки плагинов (например, сканер штрихкодов
      # добавляет .so под arm64+armv7+x86_64 разом, +12 МБ лишнего). Поэтому
      # используем --split-per-abi и берём только arm64-сборку явно.
      - name: Сборка релизного APK (split-per-abi, только arm64)
        run: |
          flutter build apk --release --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/app-release.apk

      - name: Публикация APK как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-release.apk

  # ──────────────────────────────────────────────
  # iOS IPA (требует macOS-раннер)
  # ──────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter-app/crazytrout_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Генерация обёрток проекта (Android + iOS)
        run: flutter create . --platforms=android,ios --project-name=crazytrout_admin --org=com.crazytroutarena

      - name: Установка зависимостей
        run: flutter pub get

      - name: Разрешения iOS (Info.plist)
        run: |
          PLIST=ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Для сканирования QR-кодов клиентов'" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothAlwaysUsageDescription string 'Для печати чеков через Bluetooth-принтер'" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothPeripheralUsageDescription string 'Для печати чеков через Bluetooth-принтер'" $PLIST || true

      - name: Минимальная версия iOS 13.0
        run: sed -i '' 's/platform :ios, .*/platform :ios, '"'"'13.0'"'"'/g' ios/Podfile

      - name: Генерация иконки приложения из логотипа
        run: dart run flutter_launcher_icons

      - name: Запуск тестов
        run: flutter test

      - name: Сборка iOS без кодирования (no-codesign)
        run: flutter build ios --release --no-codesign

      - name: Создание IPA из .app
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-release.ipa Payload
          rm -rf Payload

      - name: Публикация IPA как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: flutter-app/crazytrout_admin/app-release.ipa

  # ──────────────────────────────────────────────
  # Релиз — создаётся ОДИН раз после обоих билдов
  # ──────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/apk

      - name: Скачивание IPA
        uses: actions/download-artifact@v4
        with:
          name: app-release-ipa
          path: artifacts/ipa

      - name: Создание GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/apk/app-release.apk
            artifacts/ipa/app-release.ipa
