name: crazytrout_admin
description: "Crazy Trout Arena — админка для чек-кассы пруда"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Показывает системный диалог печати (AirPrint на iOS, службы печати на Android).
  # Рендерит чек в PDF и передаёт его в системный print-dialog — прямой аналог
  # кнопки «Печать через AirPrint» из веб-версии.
  printing: ^5.12.0
  pdf: ^3.10.8

  # Прямой поиск и подключение к Bluetooth-принтерам (ESC/POS), аналог кнопки
  # «Найти принтер и распечатать» из веб-версии, но уже с полноценным доступом
  # к Bluetooth на iOS (в отличие от Web Bluetooth, недоступного в Safari).
  flutter_blue_plus: ^1.32.12

  # Запрос рантайм-разрешений BLUETOOTH_SCAN/BLUETOOTH_CONNECT на Android 12+ —
  # без них FlutterBluePlus.startScan() падает молча (кнопка «ничего не делает»).
  permission_handler: ^11.3.0

  intl: ^0.19.0

  # Сканер QR-кода — идентификация клиента через камеру.
  # Точная фиксация! ^5.2.3 разрешает 5.x → newer версии используют
  # unbundled ML Kit с DI-системой, которую R8 вырезает → краш при старте.
  # 5.2.3 использует bundled ML Kit (как в рабочей v1.3.3).
  mobile_scanner: 5.2.3

  # Мониторинг ошибок и крашей в продакшене — единственный способ получить
  # реальный crash trace без физического доступа к устройству (adb logcat).
  # DSN продублирован на нативном уровне через AndroidManifest meta-data
  # (см. workflow) — так Sentry стартует ДО инициализации Dart/Flutter и
  # ловит даже самые ранние нативные краши, которые Dart-level init()
  # мог бы пропустить.
  sentry_flutter: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/icon/icon_foreground.png
    - assets/fonts/PTSans-Regular.ttf
    - assets/fonts/PTSans-Bold.ttf
    - assets/avatars/avatar_1.jpeg
    - assets/avatars/avatar_2.jpeg
    - assets/avatars/avatar_3.jpeg
    - assets/avatars/avatar_4.jpeg
    - assets/avatars/avatar_5.jpeg
    - assets/avatars/avatar_6.jpeg
    - assets/avatars/avatar_7.jpeg
    - assets/avatars/avatar_8.jpeg
    - assets/avatars/incognito.png
    - assets/icon/splash_logo.png
    - assets/icon/splash_logo.jpg
    - assets/icon/icon_check.png
    - assets/fish/sturgeon.png
    - assets/fish/carp.png
    - assets/fish/grass_carp.png
    - assets/fish/tench.png
    - assets/fish/trout.png

# Автогенерация нативных иконок (Android + iOS) из логотипа компании.
# После `flutter pub get` запустите: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FBF6EC"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true

